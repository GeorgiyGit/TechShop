<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechnoWorld Admin - Add Brand</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="../../styles/products.css" rel="stylesheet">
    <link href="../../styles/admin.css" rel="stylesheet">
</head>

<body class="admin-body">
    <header>
        <nav>
            <div class="d-flex align-items-center gap-2">
                <a href="../../../index.html" class="logo">TechnoWorld</a>
                <span class="admin-panel-badge">Admin</span>
            </div>
            <div class="d-flex align-items-center gap-3">
                <a href="../products.html" class="btn btn-outline-light btn-sm px-3 fw-500">
                    <i class="bi bi-shop me-1"></i>View Store
                </a>
                <div class="d-flex align-items-center gap-2">
                    <div class="admin-user-avatar">
                        <i class="bi bi-person-fill"></i>
                    </div>
                    <span class="white-text fw-500 small">Admin</span>
                </div>
            </div>
        </nav>
    </header>

    <div class="admin-wrapper">
        <aside class="admin-sidebar">
            <p class="admin-nav-section">Catalog</p>
            <nav class="admin-nav">
                <a href="categories.html" class="admin-nav-link">
                    <i class="bi bi-grid-3x3-gap-fill"></i>Categories
                </a>
                <a href="brands.html" class="admin-nav-link active">
                    <i class="bi bi-tag"></i>Brands
                </a>
                <a href="products.html" class="admin-nav-link">
                    <i class="bi bi-box-seam"></i>Products
                </a>
            </nav>
            <p class="admin-nav-section">Sales</p>
            <nav class="admin-nav">
                <a href="orders.html" class="admin-nav-link">
                    <i class="bi bi-receipt"></i>Orders
                </a>
            </nav>
        </aside>
        <main class="admin-content">
            <div class="admin-page-header">
                <div>
                    <h1 class="admin-page-title">Add Brand</h1>
                    <p class="admin-breadcrumb">
                        <a href="#">Admin</a> / <a href="brands.html">Brands</a> / Add Brand
                    </p>
                </div>
                <a href="brands.html" class="btn btn-clear-filters fw-500">
                    <i class="bi bi-arrow-left me-1"></i>Back to Brands
                </a>
            </div>
            <form novalidate>
                <div class="row g-4">
                    <div class="col-lg-8">
                        <div class="admin-form-card">
                            <p class="admin-form-section-title">Basic Information</p>

                            <div class="mb-0">
                                <label class="admin-form-label" for="brandName">
                                    Brand Name <span class="text-danger">*</span>
                                </label>
                                <input type="text" id="brandName" class="admin-form-control"
                                    placeholder="e.g. Samsung" required>
                                <p class="admin-form-hint">The brand name as it will appear across the store.</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="admin-form-actions">
                            <button type="submit" class="btn btn-primary-brand fw-600 px-4">
                                <i class="bi bi-check-lg me-2"></i>Save Brand
                            </button>
                            <a href="brands.html" class="btn btn-clear-filters">Cancel</a>
                        </div>
                    </div>
                </div>
            </form>
        </main>
    </div>

    <footer>
        <div class="socials">
            <a href="#" class="social-link" aria-label="Facebook"><i class="bi bi-facebook"></i></a>
            <a href="#" class="social-link" aria-label="Instagram"><i class="bi bi-instagram"></i></a>
            <a href="#" class="social-link" aria-label="Twitter/X"><i class="bi bi-twitter-x"></i></a>
            <a href="#" class="social-link" aria-label="YouTube"><i class="bi bi-youtube"></i></a>
        </div>
        <div class="pages">
            <a href="../../../index.html" class="footer-link">Home</a>
            <a href="../../../index.html" class="footer-link">Privacy Policy</a>
            <a href="../../../index.html#about" class="footer-link">About</a>
        </div>
        <div class="emails">
            <p class="footer-email mb-1">xsladkovskyi@stuba.sk</p>
            <p class="footer-email mb-0">xsorochynskyi@stuba.sk</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
