<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechnoWorld Admin - Add Category</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="../../styles/products.css" rel="stylesheet">
    <link href="../../styles/admin.css" rel="stylesheet">
</head>

<body class="admin-body">
    <header>
        <nav class="home-header-nav">
            <div class="d-flex align-items-center gap-3 home-header-left">
                <a href="../../../index.html" class="logo">TechnoWorld</a>
            </div>
            <div class="home-header-center">
                <div class="input-group navbar-search home-navbar-search">
                    <input type="text" class="form-control navbar-search-input"
                        placeholder="Search for products, brands and more...">
                    <button class="btn navbar-search-btn" type="button" aria-label="Search">
                        <i class="bi bi-search"></i>
                    </button>
                </div>
            </div>
            <div class="d-flex align-items-center gap-2 mt-2 mt-lg-0 home-header-right">
                <a href="../cart.html" class="btn btn-nav-icon" aria-label="Cart">
                    <i class="bi bi-cart3 fs-5"></i>
                </a>
                <a href="../signup.html" class="btn btn-outline-light btn-sm px-3 fw-500">Sign Up</a>
                <a href="../login.html" class="btn btn-light btn-sm px-3 blue-text fw-500">Log In</a>
            </div>
        </nav>
    </header>

    <div class="admin-wrapper">
        <aside class="admin-sidebar">
            <p class="admin-nav-section">Catalog</p>
            <nav class="admin-nav">
                <a href="categories.html" class="admin-nav-link active">
                    <i class="bi bi-grid-3x3-gap-fill"></i>Categories
                </a>
                <a href="brands.html" class="admin-nav-link">
                    <i class="bi bi-tag"></i>Brands
                </a>
                <a href="products.html" class="admin-nav-link">
                    <i class="bi bi-box-seam"></i>Products
                </a>
            </nav>
            <p class="admin-nav-section">Sales</p>
            <nav class="admin-nav">
                <a href="orders.html" class="admin-nav-link">
                    <i class="bi bi-receipt"></i>Orders
                </a>
            </nav>
        </aside>
        <main class="admin-content">
            <div class="admin-page-header">
                <div>
                    <h1 class="admin-page-title">Add Category</h1>
                    <p class="admin-breadcrumb">
                        <a href="#">Admin</a> / <a href="categories.html">Categories</a> / Add Category
                    </p>
                </div>
                <a href="categories.html" class="btn btn-clear-filters fw-500">
                    <i class="bi bi-arrow-left me-1"></i>Back to Categories
                </a>
            </div>
            <form novalidate>
                <div class="row g-4">

                    <div class="col-lg-8">
                        <div class="admin-form-card">
                            <p class="admin-form-section-title">Basic Information</p>

                            <div class="mb-3">
                                <label class="admin-form-label" for="catName">
                                    Category Name <span class="text-danger">*</span>
                                </label>
                                <input type="text" id="catName" class="admin-form-control"
                                    placeholder="e.g. Smartphones" required>
                            </div>

                        </div>
                    </div>
                    <div class="col-lg-4 d-flex flex-column gap-4">
                        <div class="admin-form-card">
                            <p class="admin-form-section-title">Category Icon</p>
                            <div class="mb-3">
                                <div class="admin-category-icon-preview mb-3">
                                    <i class="bi bi-grid" id="iconPreview"></i>
                                </div>
                                <label class="admin-form-label" for="catIcon">Bootstrap Icon Class</label>
                                <input type="text" id="catIcon" class="admin-form-control" placeholder="e.g. bi-phone"
                                    oninput="document.getElementById('iconPreview').className='bi '+this.value">
                            </div>
                            <p class="admin-form-label mb-2">Quick select</p>
                            <div class="admin-icon-picker">
                                <button type="button" class="admin-icon-option" title="Smartphones"
                                    onclick="setIcon('bi-phone')"><i class="bi bi-phone"></i></button>
                                <button type="button" class="admin-icon-option" title="Laptops"
                                    onclick="setIcon('bi-laptop')"><i class="bi bi-laptop"></i></button>
                                <button type="button" class="admin-icon-option" title="Tablets"
                                    onclick="setIcon('bi-tablet')"><i class="bi bi-tablet"></i></button>
                                <button type="button" class="admin-icon-option" title="Headphones"
                                    onclick="setIcon('bi-headphones')"><i class="bi bi-headphones"></i></button>
                                <button type="button" class="admin-icon-option" title="Cameras"
                                    onclick="setIcon('bi-camera')"><i class="bi bi-camera"></i></button>
                                <button type="button" class="admin-icon-option" title="Gaming"
                                    onclick="setIcon('bi-controller')"><i class="bi bi-controller"></i></button>
                                <button type="button" class="admin-icon-option" title="Smart Watches"
                                    onclick="setIcon('bi-smartwatch')"><i class="bi bi-smartwatch"></i></button>
                                <button type="button" class="admin-icon-option" title="TVs"
                                    onclick="setIcon('bi-tv')"><i class="bi bi-tv"></i></button>
                                <button type="button" class="admin-icon-option" title="Speakers"
                                    onclick="setIcon('bi-speaker')"><i class="bi bi-speaker"></i></button>
                                <button type="button" class="admin-icon-option" title="Printers"
                                    onclick="setIcon('bi-printer')"><i class="bi bi-printer"></i></button>
                                <button type="button" class="admin-icon-option" title="Networking"
                                    onclick="setIcon('bi-router')"><i class="bi bi-router"></i></button>
                                <button type="button" class="admin-icon-option" title="Accessories"
                                    onclick="setIcon('bi-bag')"><i class="bi bi-bag"></i></button>
                                <button type="button" class="admin-icon-option" title="PC Components"
                                    onclick="setIcon('bi-cpu')"><i class="bi bi-cpu"></i></button>
                                <button type="button" class="admin-icon-option" title="Smart Home"
                                    onclick="setIcon('bi-lightbulb')"><i class="bi bi-lightbulb"></i></button>
                                <button type="button" class="admin-icon-option" title="VR &amp; AR"
                                    onclick="setIcon('bi-badge-vr')"><i class="bi bi-badge-vr"></i></button>
                                <button type="button" class="admin-icon-option" title="Drones"
                                    onclick="setIcon('bi-airplane')"><i class="bi bi-airplane"></i></button>
                            </div>
                        </div>
                        <script>
                            function setIcon(icon_id) {
                                document.getElementById('catIcon').value = icon_id;
                                document.getElementById('iconPreview').className = 'bi ' + icon_id;
                            }
                        </script>
                    </div>
                    <div class="col-12">
                        <div class="admin-form-actions">
                            <button type="submit" class="btn btn-primary-brand fw-600 px-4">
                                <i class="bi bi-check-lg me-2"></i>Save Category
                            </button>
                            <a href="categories.html" class="btn btn-clear-filters">Cancel</a>
                        </div>
                    </div>
                </div>
            </form>
        </main>
    </div>

    <footer>
        <div class="socials">
            <a href="https://www.linkedin.com/in/george-sladkovsky-537a27257/" target="_blank" rel="noopener noreferrer" class="social-link" aria-label="Facebook"><i class="bi bi-facebook"></i></a>
            <a href="https://www.linkedin.com/in/george-sladkovsky-537a27257/" target="_blank" rel="noopener noreferrer" class="social-link" aria-label="Instagram"><i class="bi bi-instagram"></i></a>
            <a href="https://www.linkedin.com/in/george-sladkovsky-537a27257/" target="_blank" rel="noopener noreferrer" class="social-link" aria-label="Twitter/X"><i class="bi bi-twitter-x"></i></a>
            <a href="https://www.linkedin.com/in/george-sladkovsky-537a27257/" target="_blank" rel="noopener noreferrer" class="social-link" aria-label="YouTube"><i class="bi bi-youtube"></i></a>
        </div>
        <div class="pages">
            <a href="../../../index.html" class="footer-link">Home</a>
            <a href="../privacy-policy.html" class="footer-link">Privacy Policy</a>
            <a href="../../../index.html#about" class="footer-link">About</a>
        </div>
        <div class="emails">
            <p class="footer-email mb-1">xsladkovskyi@stuba.sk</p>
            <p class="footer-email mb-0">xsorochynskyi@stuba.sk</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
