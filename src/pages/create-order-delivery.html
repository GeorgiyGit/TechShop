<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechnoWorld - Delivery</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="../styles/products.css" rel="stylesheet">
    <link href="../styles/create-order.css" rel="stylesheet">
</head>

<body>
    <header>
        <nav class="home-header-nav">
            <div class="d-flex align-items-center gap-3 home-header-left">
                <a href="../../index.html" class="logo">TechnoWorld</a>
            </div>
            <div class="home-header-center">
                <div class="input-group navbar-search home-navbar-search">
                    <input type="text" class="form-control navbar-search-input"
                        placeholder="Search for products, brands and more...">
                    <button class="btn navbar-search-btn" type="button" aria-label="Search">
                        <i class="bi bi-search"></i>
                    </button>
                </div>
            </div>
            <div class="d-flex align-items-center gap-2 mt-2 mt-lg-0 home-header-right">
                <a href="cart.html" class="btn btn-nav-icon" aria-label="Cart">
                    <i class="bi bi-cart3 fs-5"></i>
                </a>
                <a href="signup.html" class="btn btn-outline-light btn-sm px-3 fw-500">Sign Up</a>
                <a href="login.html" class="btn btn-light btn-sm px-3 blue-text fw-500">Log In</a>
            </div>
        </nav>
    </header>

    <main class="create-order-main">
        <section class="create-order-section">
            <h1 class="create-order-title">Create Order</h1>
            <nav class="stepper" aria-label="Checkout steps">
                <ol class="stepper-list">
                    <li class="stepper-item completed">
                        <span class="stepper-number"><i class="bi bi-check-lg"></i></span>
                        <span class="stepper-label">Items</span>
                    </li>
                    <li class="stepper-connector active"></li>
                    <li class="stepper-item completed">
                        <span class="stepper-number"><i class="bi bi-check-lg"></i></span>
                        <span class="stepper-label">Contact</span>
                    </li>
                    <li class="stepper-connector active"></li>
                    <li class="stepper-item active">
                        <span class="stepper-number">3</span>
                        <span class="stepper-label">Delivery</span>
                    </li>
                    <li class="stepper-connector"></li>
                    <li class="stepper-item">
                        <span class="stepper-number">4</span>
                        <span class="stepper-label">Payment</span>
                    </li>
                </ol>
            </nav>
            <h2 class="step-heading">Delivery Method</h2>

            <form class="create-order-form" action="create-order-payment.html" method="get">
                <div class="delivery-method-group" role="radiogroup" aria-label="Delivery method">
                    <label class="delivery-method-card selected">
                        <input type="radio" name="delivery_method" value="courier" checked class="visually-hidden">
                        <span class="delivery-method-icon"><i class="bi bi-truck"></i></span>
                        <span class="delivery-method-info">
                            <span class="delivery-method-name">Courier Delivery</span>
                            <span class="delivery-method-desc">Delivered to your door in 2-5 business days</span>
                        </span>
                        <span class="delivery-method-price">10.00 €</span>
                    </label>
                    <a href="create-order-pickup.html" class="delivery-method-card text-decoration-none">
                        <span class="delivery-method-icon"><i class="bi bi-shop"></i></span>
                        <span class="delivery-method-info">
                            <span class="delivery-method-name">Store Pickup</span>
                            <span class="delivery-method-desc">Pick up from our store, ready in 1-2 days</span>
                        </span>
                        <span class="delivery-method-price">Free</span>
                    </a>
                </div>

                <h3 class="step-subheading">Shipping Address</h3>

                <div class="step-form-grid">
                    <div class="form-field">
                        <label class="form-field-label" for="addr-country">Country</label>
                        <input class="create-order-input" type="text" id="addr-country" name="country" placeholder="e.g. Slovakia" required>
                    </div>
                    <div class="form-field">
                        <label class="form-field-label" for="addr-city">City</label>
                        <input class="create-order-input" type="text" id="addr-city" name="city" placeholder="e.g. Bratislava" required>
                    </div>
                    <div class="form-field full-width">
                        <label class="form-field-label" for="addr-street">Street</label>
                        <input class="create-order-input" type="text" id="addr-street" name="street" placeholder="e.g. Staré Grunty, Karlova Ves" required>
                    </div>
                    <div class="form-field">
                        <label class="form-field-label" for="addr-house">House Number</label>
                        <input class="create-order-input" type="text" id="addr-house" name="house" placeholder="e.g. 53" required>
                    </div>
                    <div class="form-field">
                        <label class="form-field-label" for="addr-postcode">Post Code</label>
                        <input class="create-order-input" type="text" id="addr-postcode" name="postcode" placeholder="e.g. 841 04" required>
                    </div>
                </div>
                <div class="step-nav">
                    <a href="create-order-contact.html" class="step-btn step-btn-prev">
                        <i class="bi bi-arrow-left"></i> Back
                    </a>
                    <button type="submit" class="step-btn step-btn-next">
                        Continue <i class="bi bi-arrow-right"></i>
                    </button>
                </div>
            </form>
        </section>
    </main>

    <footer>
        <div class="socials">
            <a href="https://www.linkedin.com/in/george-sladkovsky-537a27257/" target="_blank" rel="noopener noreferrer" class="social-link" aria-label="Facebook"><i class="bi bi-facebook"></i></a>
            <a href="https://www.linkedin.com/in/george-sladkovsky-537a27257/" target="_blank" rel="noopener noreferrer" class="social-link" aria-label="Instagram"><i class="bi bi-instagram"></i></a>
            <a href="https://www.linkedin.com/in/george-sladkovsky-537a27257/" target="_blank" rel="noopener noreferrer" class="social-link" aria-label="Twitter/X"><i class="bi bi-twitter-x"></i></a>
            <a href="https://www.linkedin.com/in/george-sladkovsky-537a27257/" target="_blank" rel="noopener noreferrer" class="social-link" aria-label="YouTube"><i class="bi bi-youtube"></i></a>
        </div>
        <div class="pages">
            <a href="../../index.html" class="footer-link">Home</a>
            <a href="privacy-policy.html" class="footer-link">Privacy Policy</a>
            <a href="../../index.html#about" class="footer-link">About</a>
        </div>
        <div class="emails">
            <p class="footer-email mb-1">xsladkovskyi@stuba.sk</p>
            <p class="footer-email mb-0">xsorochynskyi@stuba.sk</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
